apis:
  - aid: st-jude-medical:merlin-net
    name: Merlin.net Patient Care Network API
    tags:
      - Cardiac
      - Healthcare
      - Patient Monitoring
      - Remote Monitoring
    baseURL: https://www.merlin.net
    humanURL: https://www.merlin.net
    description: >-
      The Merlin.net Patient Care Network is Abbott's (formerly St. Jude
      Medical's) remote cardiac monitoring platform. It allows clinicians to
      receive scheduled transmissions and daily alert notifications from
      patients with implanted cardiac rhythm management devices including ICDs,
      CRT devices, and pacemakers. The Merlin@home transmitter communicates
      with the implanted device via radio frequency and transmits data to the
      Merlin.net platform via landline, cellular, or wireless broadband.
    properties:
      - url: https://www.cardiovascular.abbott/us/en/hcp/products/cardiac-rhythm-management/connectivity-remote-care/merlin-home-transmitter.html
        type: Documentation
      - url: https://www.merlin.net
        type: Portal

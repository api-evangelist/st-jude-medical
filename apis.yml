aid: st-jude-medical
name: St. Jude Medical
description: >-
  St. Jude Medical was a global medical device company specializing in
  cardiovascular devices including implantable cardioverter defibrillators
  (ICDs), pacemakers, cardiac resynchronization therapy (CRT) devices, and
  electrophysiology products. The company was acquired by Abbott in January
  2017 and now operates as Abbott's cardiac rhythm management division. Its
  flagship remote monitoring platform, Merlin.net Patient Care Network, enables
  clinicians to remotely monitor patients with implanted cardiac devices via
  the Merlin@home transmitter and the myMerlinPulse mobile application.
